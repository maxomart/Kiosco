# Nixpacks configuration para Railway

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = [
  "npx prisma generate",
  "npx next build"
]

[start]
cmd = "npx prisma db push --accept-data-loss --skip-generate && node scripts/ensure-admin.js && npx next start -p ${PORT:-3000}"
