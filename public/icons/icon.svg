<?xml version="1.0" encoding="UTF-8"?>
<!--
  Orvex brand mark ‚Äî open ring + diagonal stroke, cyan‚Üíblue‚Üíviolet gradient
  on a dark rounded-square background. Matches the in-app <OrvexLogo>
  component. Used for the PWA install icon (Android) via manifest.json.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g" x1="50" y1="50" x2="450" y2="450" gradientUnits="userSpaceOnUse">
